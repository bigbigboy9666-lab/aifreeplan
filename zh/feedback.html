<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言板 - AIFreePlan</title>
<meta name="description" content="AIFreePlan 留言板 - 提建议、报Bug、分享心得">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#6366F1">
<link rel="canonical" href="https://aifreeplan.com/zh/feedback">
<link rel="alternate" hreflang="zh" href="https://aifreeplan.com/zh/feedback">
<link rel="alternate" hreflang="en" href="https://aifreeplan.com/en/feedback">
<link rel="alternate" hreflang="x-default" href="https://aifreeplan.com/en/feedback">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8FAFC;--bg-white:#fff;--border:#E2E8F0;--border-light:#F1F5F9;
  --text:#1E1B4B;--text-secondary:#64748B;--text-muted:#94A3B8;
  --accent:#6366F1;--accent-hover:#4F46E5;--accent-light:rgba(99,102,241,.1);
  --green:#059669;--green-light:rgba(5,150,105,.1);
  --shadow:0 4px 20px rgba(0,0,0,.05);--shadow-hover:0 8px 32px rgba(0,0,0,.1);
  --radius:12px;--radius-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:1280px;margin:0 auto;padding:0 40px}
.header{background:var(--bg-white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-size:24px;font-weight:700}
.logo .accent{color:var(--accent)}
.nav{display:flex;gap:32px;align-items:center}
.nav a{color:var(--text);text-decoration:none;font-size:15px;font-weight:500;transition:color .2s}
.nav a:hover{color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 22px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.footer{background:#1a1a2e;padding:50px 0 30px;color:#fff}
.footer-inner{display:flex;justify-content:space-between;gap:60px;flex-wrap:wrap}
.footer-brand{max-width:300px}
.footer-brand .logo{color:var(--green);margin-bottom:8px;display:inline-block}
.footer-brand p{font-size:14px;color:rgba(255,255,255,.6);line-height:1.5}
.footer-links{display:flex;gap:60px}
.footer-col{display:flex;flex-direction:column;gap:10px}
.footer-col h4{font-size:14px;font-weight:700;margin-bottom:4px;color:#fff}
.footer-col a{color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;transition:color .2s}
.footer-col a:hover{color:#fff}
.footer-bottom{margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:rgba(255,255,255,.4)}
@media(max-width:768px){
  .container{padding:0 20px}
  .nav{display:none}
  .footer-inner{flex-direction:column;gap:30px}
  .footer-links{gap:30px}
}

#giscus-container {
    margin-top: 30px;
    min-height: 300px;
}

</style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="/zh" class="logo">AI<span class="accent">FreePlan</span></a>
    <nav class="nav">
      <a href="/zh/all">全部工具</a>
      <a href="/zh/guides">攻略</a>
      <a href="/zh/feedback">留言板</a>
      <a href="/zh/privacy">隐私政策</a>
      <a href="/en/feedback" class="btn btn-primary">English</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top:40px;padding-bottom:80px">

<div style="max-width:800px;margin:0 auto">
    <h1 style="font-size:32px;font-weight:800;margin-bottom:16px;text-align:center">
        💬 留言板
    </h1>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:40px;font-size:18px">
        欢迎在这里留言！你可以提建议、报Bug、或者随便聊聊
    </p>
    
    <div style="background:var(--bg-white);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow)">
        <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">
            📝 你可以在这里说：
        </h2>
        <ul style="list-style:none;margin-bottom:30px">
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">
                ✅ 建议添加新工具（告诉我工具名和官网）
            </li>
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">
                ✅ 报告问题（链接失效、信息有误等）
            </li>
            <li style="padding:8px 0;border-bottom:1px solid var(--border-light)">
                ✅ 分享使用心得
            </li>
            <li style="padding:8px 0">
                ✅ 任何你想说的
            </li>
        </ul>
        
        <div style="background:var(--accent-light);border-radius:8px;padding:16px;margin-bottom:30px">
            <p style="font-size:14px;color:var(--accent)">
                💡 提示：评论需要 GitHub 账号，这是为了防止垃圾评论
            </p>
        </div>
        
        <div id="giscus-container">
            <!-- Giscus 评论区 -->
        </div>
    </div>
</div>

</main>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="/zh" class="logo">AI<span class="accent" style="color:var(--green)">FreePlan</span></a>
        <p>AI驱动的免费工具聚合平台，永久免费。</p>
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <h4>产品</h4>
          <a href="/zh/all">全部工具</a>
          <a href="/zh/guides">攻略</a>
          <a href="/zh/feedback">留言板</a>
        </div>
        <div class="footer-col">
          <h4>法律</h4>
          <a href="/zh/privacy">隐私政策</a>
          <a href="/zh/terms">用户条款</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© 2026 AIFreePlan. 保留所有权利。</div>
  </div>
</footer>


<script src="https://giscus.app/client.js"
        data-repo="bigbigboy9666-lab/aifreeplan"
        data-repoId="R_kgDOSf8t_A"
        data-category="Announcements"
        data-categoryId="DIC_kwDOSf8t_M4C-nuS"
        data-mapping="pathname"
        data-strict="0"
        data-reactionsEnabled="1"
        data-emitMetadata="0"
        data-inputPosition="top"
        data-theme="light"
        data-lang="zh"
        crossorigin="anonymous"
        async>
</script>

</body>
</html>
